map $http_origin $allow_origin {
    ~^https?:\/\/(.*\.)?(?:localhost|dev|cloudcenter|pre|scib\.pre|santandercib|santandercashnexus|scib\.gs)\.?(?:corp|com)?(:\d+)?$ $http_origin;
    default "";
}

server {
    listen       8080;
    server_name  localhost;

	root /usr/share/nginx/html;

    large_client_header_buffers 8 64k;
    client_header_buffer_size 64k;
    proxy_buffering off;
    etag off;

	add_header 'X-Frame-Options' 'SAMEORIGIN' always;
	add_header 'X-Content-Type-Options' 'nosniff' always;
	add_header 'X-XSS-Protection' '1; mode=block' always;
	add_header 'Strict-Transport-Security' 'max-age=31536000; includeSubDomains' always;

	add_header 'Access-Control-Allow-Credentials' 'true' always;
	add_header 'Access-Control-Allow-Origin' "$allow_origin" always;
	add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
	add_header 'Access-Control-Allow-Headers' 'Authorization, current-glcs, Origin, Cookie, Set-Cookie, Accept-Language, DNT, X-CustomHeader, Keep-Alive, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Accept' always;
	add_header 'Access-Control-Expose-Headers' 'Authorization, current-glcs, Content-Length, Content-Range' always;
	
    gzip on;
    gzip_http_version 1.1;
    gzip_disable      "MSIE [1-6]\.";
    gzip_min_length   256;
    gzip_vary         on;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types        text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_comp_level   9;

	#
	# Default path
	#
    location / {
		root /usr/share/nginx/html/<%= ENV["DIST_FOLDER"] %>;

		if ($request_method = 'OPTIONS') {
			add_header 'Access-Control-Allow-Credentials' 'true' always;
			add_header 'Access-Control-Allow-Origin' "$allow_origin" always;
			add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'Authorization, current-glcs, Origin, Cookie, Set-Cookie, Accept-Language, DNT, X-CustomHeader, Keep-Alive, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Accept' always;
			add_header 'Access-Control-Expose-Headers' 'Authorization, current-glcs, Content-Length, Content-Range' always;
			add_header 'Access-Control-Max-Age' 1728000;
			add_header 'Content-Type' 'text/plain; charset=utf-8';
			add_header 'Content-Length' 0;
			return 204;
		}

		# Remove when we chnage to new architecture
		if ($request_method = 'GET') {
            expires -1;
        }

		add_header 'Access-Control-Allow-Credentials' 'true' always;
		add_header 'Access-Control-Allow-Origin' "$allow_origin" always;
		add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
		add_header 'Access-Control-Allow-Headers' 'Authorization, current-glcs, Origin, Cookie, Set-Cookie, Accept-Language, DNT, X-CustomHeader, Keep-Alive, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type, Accept' always;
		add_header 'Access-Control-Expose-Headers' 'Authorization, current-glcs, Content-Length, Content-Range' always;
    }

	#
	# Static assets
	#
	location ~ ^/remote/resources/cdn/(.*)$ {
		if ($request_method = 'OPTIONS') {
			add_header 'Access-Control-Allow-Credentials' 'true';
			add_header 'Access-Control-Allow-Origin' "$allow_origin";
			add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD';
			add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, Cookie, Set-Cookie, Accept-Language, current-glcs, DNT, X-CustomHeader, Keep-Alive, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control';
			add_header 'Access-Control-Expose-Headers' 'Authorization, current-glcs, Content-Length, Content-Range';
			add_header 'Access-Control-Max-Age' 1728000;
			add_header 'Content-Type' 'text/plain; charset=utf-8';
			add_header 'Content-Length' 0;
			return 204;
		}

		if ($request_method = 'GET') {
            expires -1;
        }

        alias /usr/share/nginx/html/<%= ENV["DIST_FOLDER"] %>/$1;
    }

	#
	# Redirect server http error pages to the static page /40x.html
	#
    error_page  400 401 403 404  /40x.html;
    location = /40x.html {
		root /usr/share/nginx/html;
    }

	#
    # Redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

	#
	# Health checker
	#
	location ~ /actuator/health$ {
       	default_type application/json;
    	return 200 '{"status":"UP"}';
    }
}
