<!DOCTYPE html>
<html dir="ltr" lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Messages App Accordion Playground</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Scripts del loader de la librería -->
		<script type="module" src="/stencil-server/scib-ui-kit.esm.js" id="component-js-module"></script>
		<script nomodule="" src="/stencil-server/scib-ui-kit.js" id="component-js"></script>

		<!-- Stilos de la libreraía -->
		<link rel="stylesheet" href="/stencil-server/scib-ui-kit.css" id="components-css" />
	</head>

	<body>
		<scib-cdk-sidebar-communications
			fixed
			open="${knobs.open}"
			profile='{
    "name": "Jesús Cárdenas Vizcaíno",
    "avatar": {
      "src": "https://outpostrecruitment.com/wp-content/uploads/2019/05/Ruairi-Spillane.png",
      "alt": "Jesús Cárdenas"
    }
  }'
			active-tab="MSG"
			tabs='[
    {
      "id": "BUL",
      "label": "Bulletines"
    },
    {
      "id": "MSG",
      "label": "Messages",
      "notifications": "3"
    },
    {
      "id": "ALE",
      "label": "Alerts and notices"
    }
  ]'
			@tabChange="handleTabChange($event)"
			@panelToggle="handlePanelChange($event)"
		></scib-cdk-sidebar-communications>
	</body>
</html>
